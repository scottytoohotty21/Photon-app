<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photon Survey System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }

        /* --- LOGO --- */
        .logo-circle {
            width: 32px; height: 32px; background: #0f172a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #ef4444; position: relative;
        }
        .logo-inner { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px rgba(239, 68, 68, 0.6); }

        /* --- GLOBAL UI --- */
        .header-bar { 
            background: #0f172a; padding: 12px; border-radius: 14px; 
            display: grid; grid-template-columns: 1.2fr 1fr 1fr 1.2fr; 
            gap: 10px; margin-bottom: 15px; border: 1px solid #334155;
        }
        .mini-label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 4px; letter-spacing: 0.02em; }
        .header-val { font-size: 10px; font-weight: 700; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .header-input { background: transparent; border: none; color: #60a5fa; font-size: 10px; font-weight: 700; width: 100%; outline: none; }

        /* --- UPDATED 5-TAB NAV --- */
        .nav-container { display: flex; gap: 4px; margin-bottom: 15px; }
        .nav-btn { 
            flex: 1; padding: 12px 1px; background: white; border: 1px solid #e2e8f0; 
            border-bottom: 3px solid #cbd5e1; border-radius: 8px; font-size: 7px; 
            font-weight: 900; color: #94a3b8; text-transform: uppercase; text-align: center;
        }
        .nav-btn.active { background: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }

        /* --- SAVE / CHANGE STYLING --- */
        .tab-content-wrapper { transition: all 0.3s ease; }
        .is-saved { background-color: #f0fdf4 !important; border: 2px solid #22c55e !important; }
        .input-field:disabled { background-color: #f8fafc; color: #64748b; border-color: #e2e8f0; cursor: not-allowed; opacity: 0.7; }
        
        .action-btn { font-size: 11px; font-weight: 900; text-transform: uppercase; padding: 0 15px; border-radius: 10px; transition: 0.2s; height: 56px; white-space: nowrap; }
        .btn-save { background: #22c55e; color: white; }
        .btn-change { background: white; color: #22c55e; border: 2px solid #22c55e; }

        /* --- DASHBOARD STYLING --- */
        .job-card { background: white; border-radius: 16px; padding: 20px; border-left: 8px solid #cbd5e1; cursor: pointer; transition: transform 0.1s; position: relative; }
        .status-active { border-left-color: #3b82f6 !important; }
        .status-pending { border-left-color: #f59e0b !important; }
        .pill { font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
        .pill-active { background: #dbeafe; color: #1e40af; }
        .pill-pending { background: #fef3c7; color: #92400e; }
        .pill-manual { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; margin-left: 4px; }
        
        .pill-new { background: #7e22ce !important; color: white !important; margin-left: 4px; }
        .notes-preview { font-size: 10px; color: #64748b; font-style: italic; margin-top: 8px; padding-left: 8px; border-left: 2px solid #cbd5e1; line-height: 1.2; }

        /* --- UPDATED CRM BUTTON --- */
        .btn-crm-upload {
            background: #10b981; color: white; border-bottom: 4px solid #047857;
            border-radius: 12px; padding: 8px 12px; transition: all 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-crm-upload:active { border-bottom-width: 0px; transform: translateY(4px); }
.btn-add-file {
    background: #3b82f6;
    color: white;
    border-bottom: 4px solid #1d4ed8;
    border-radius: 12px;
    padding: 8px 12px;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.btn-add-file:active {
    border-bottom-width: 0px;
    transform: translateY(4px);
}
        .btn-upload-glow {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; font-weight: 900; text-transform: uppercase;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.4); border: none;
            width: 100px; height: 44px; display: flex; align-items: center; justify-content: center;
        }

        .seq-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc; padding: 6px 10px; border-radius: 8px; margin-top: 5px; border: 1px solid #e2e8f0;
        }

        /* --- GRID SYSTEM --- */
        .prop-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; }
        .col-12 { grid-column: span 12; }
        .col-7 { grid-column: span 7; }
        .col-6 { grid-column: span 6; }
        .col-5 { grid-column: span 5; }
        .col-3 { grid-column: span 3; }
        
        .input-field { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; outline: none; background: #fff; }
        
        #manual-entry-area { display: none; background: white; border: 3px solid #3b82f6; border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .add-stop-btn { font-size: 9px; font-weight: 900; color: #3b82f6; text-transform: uppercase; padding: 4px 8px; border: 1px dashed #3b82f6; border-radius: 6px; margin-top: 5px; display: inline-block; }

        @keyframes uiPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); border-color: #22c55e; }
            100% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); border-color: #e2e8f0; }
        }
        .pulse-new { animation: uiPulse 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .pulse-blue {
    animation: pulseBlue 0.5s ease;
}

.pulse-red {
    animation: pulseRed 0.5s ease;
}

@keyframes pulseBlue {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.45); }
    50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(59,130,246,0.12); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}

@keyframes pulseRed {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.45); }
    50% { transform: scale(1.04); box-shadow: 0 0 0 10px rgba(239,68,68,0.12); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

        .add-property-btn {
            background: #3b82f6; color: white; border-radius: 10px; transition: 0.2s;
            height: 56px; display: flex; align-items: center; padding: 0 20px;
            font-family: 'Inter', sans-serif;
        }
        .btn-plus-icon { font-size: 18px; font-weight: 400; width: 30px; }
        .btn-text-block { display: flex; flex-direction: column; text-align: left; }
        .btn-text-upper { font-weight: 900; font-size: 11px; text-transform: uppercase; line-height: 1.1; }
        .btn-text-lower { font-weight: 900; font-size: 11px; text-transform: uppercase; line-height: 1.1; }

        /* --- INVENTORY SPECIFIC UI --- */
.inv-header-select { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 8px; font-weight: 900; font-size: 11px; text-transform: uppercase; height: 38px; width: 100%; }

.inv-top-field {
    height: 64px !important;
}

.inv-tool-btn { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; color: #64748b; font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 8px 4px; text-align: center; }

        .inv-room-btn { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; color: #64748b; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 12px 2px; text-align: center; flex: 1; }
        .inv-room-btn.active { background: #3b82f6; color: white; border-color: #2563eb; }
      .item-btn {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    color: #0f172a;
    padding: 5px;
}
        .item-btn-blue { background: #f0f9ff; color: #0f172a; border: 1px solid #e0f2fe; }
        .log-bar { background: #e2e8f0; border: 1.5px solid #94a3b8; border-radius: 6px; padding: 8px 12px; font-size: 11px; font-weight: 900; font-style: italic; color: #1e293b; }
.vol-box { border: 2.5px solid #fca5a5; border-radius: 8px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.total-vol-box { background: #3b82f6; color: white; border-radius: 8px; height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* --- NEW JOB HEADER --- */

.job-header {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.job-client {
    font-size: 16px;
    font-weight: 900;
    color: white;
    text-transform: uppercase;
    line-height: 1.1;
}

.job-subline {
    font-size: 10px;
    font-weight: 800;
    color: #60a5fa;
    text-transform: uppercase;
    margin-top: 4px;
    letter-spacing: 0.04em;
}

.job-status-pill {
    background: #1e293b;
    border: 1px solid #475569;
    color: #93c5fd;
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
}
    </style>
</head>
<body class="p-4 pb-12">

    <main id="view-dashboard">

<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        <section id="manual-entry-area" class="shadow-xl">

Enter as: Surname, First Name

    <main id="view-editor" class="hidden">

        </div>

</div>

        <nav class="nav-container">

                <button id="btn-save-address" onclick="toggleSaveState('address')" class="action-btn btn-save">Save</button>

            <div id="address-editor-ui" class="space-y-6"></div>

    <script>
        const PROPERTY_TYPES = ["House", "Apartment", "Bungalow", "Office", "Shop"];
        const VEHICLE_TYPES = ["Shuttle van", "Transit van", "Luton / Low Loader", "7.5 tonne", "12 tonne", "15 tonne", "18 tonne", "20ft container", "40ft container"];
        const MOVE_TYPES = ["Dom-local", "Dom-Distance", "Dom-To Store", "Dom-Ex Store", "Dom-Direct/Store", "GPG", "LCL", "FCL"];
        const PACK_OPTIONS = ["Owner Pack", "Fragile (china & Glassware) pack", "Full Packing", "Full Export Pack and Wrap", "Fragile & Kitchenware Pack"];
        const SALUTATIONS = ["Mr", "Miss", "Mrs", "Ms", "Other"];

const furnitureDB = [
    {item:"AC Unit", volume:10},
    {item:"Armchair", volume:20},
    {item:"Sofa 2 Seat", volume:35},
    {item:"Sofa 3 Seat", volume:50},
    {item:"Bed (Single)", volume:40},
    {item:"Bed (Double)", volume:60},
    {item:"Fridge", volume:25},
    {item:"Garden Bench", volume:15},
    {item:"Chest Drawers", volume:45},
    {item:"Dining Table", volume:40},
    {item:"Desk", volume:20},

    document.getElementById('nav-' + t).classList.add('active');

    if (t === 'sequence') renderSequenceUI();
    if (t === 'address') renderAddressUI();
   if (t === 'inventory') {
    renderInventorySequenceDropdown();
    renderInventoryButtons();
    updateInventoryDisplay();
    updateUndoButtonState();
}
}
function splitManualName(fullName) {
    const cleaned = (fullName || "").trim();

    if (!cleaned) {
        return { surname: "", firstName: "" };
    }

    if (cleaned.includes(",")) {
        const parts = cleaned.split(",");
        return {
            surname: (parts[0] || "").trim(),
            firstName: (parts.slice(1).join(",") || "").trim()
        };
    }

    // fallback if user forgets the comma
    const words = cleaned.split(/\s+/);
    return {
        surname: words[0] || "",
        firstName: words.slice(1).join(" ")
    };
}
        function toggleManualArea() { const area = document.getElementById('manual-entry-area'); area.style.display = (area.style.display === "block") ? "none" : "block"; document.getElementById('timestamp-val').innerText = new Date().toLocaleString('en-GB'); }
function createManualJob() {
    const name = document.getElementById('m-name').value.trim();
    if (!name) return;

    const parsedName = splitManualName(name);
    const newProperties = createDefaultProperties();

    newProperties[0].firstName = parsedName.firstName;
    newProperties[0].surname = parsedName.surname;
    newProperties[0].clientName = name;

    const ref = document.getElementById('m-ref').value || "M-" + Math.floor(Math.random() * 900);
    const displayName = name.toUpperCase();

    const newJob = createEmptyJob({
        ref: ref,
        name: displayName,
        status: "pending",
        isNew: true,
        isManual: true,
        notes: "New manually created survey.",
        properties: newProperties,
        addresses: newProperties,
        customer: {
            displayName: displayName,
            firstName: parsedName.firstName,
            surname: parsedName.surname,
            salutation: "",
            homePhone: "",
            mobilePhone: "",
            email: ""
        },
        survey: {
            status: "pending",
            isNew: true,
            isManual: true,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            notes: "New manually created survey."
        }
    });

    jobs.unshift(newJob);

    saveToDevice();
    renderDashboard();

    document.getElementById('m-name').value = "";
    document.getElementById('m-ref').value = "";

    toggleManualArea();
}
        function exitToDashboard() { document.getElementById('view-editor').classList.add('hidden'); document.getElementById('view-dashboard').classList.remove('hidden'); renderDashboard(); }
function calculateMoveCost(){

let crew = parseFloat(document.getElementById("crew-cost").value) || 0;

let other = parseFloat(document.getElementById("other-costs").value) || 0;

function addVolume(amount) {
    const qtyInput = document.getElementById("inv-qty");
    let qty = parseInt(qtyInput?.value, 10);
    if (isNaN(qty) || qty < 1) qty = 1;

    const addedVolume = amount * qty;

    inventoryHistory.push({
        type: "volume",
        addedVolume: addedVolume,
        unitVolume: amount,
        qtyAdded: qty
    });

    currentItemVolume = addedVolume;
    totalVolume += addedVolume;

    updateInventoryDisplay(`+ ${qty} X ${amount} CUFT`);
    triggerInventoryPulse("qty", "blue");
    triggerInventoryPulse("total", "blue");
    triggerHaptic("light");

    if (qtyInput) qtyInput.value = 1;
    updateUndoButtonState();
}
function addInventoryItem(itemName) {
    let item = furnitureDB.find(i => i.item === itemName);
    if (!item) return;

    const qtyInput = document.getElementById("inv-qty");
    let qty = parseInt(qtyInput?.value, 10);
    if (isNaN(qty) || qty < 1) qty = 1;

    lastAddedItemName = itemName;

    let existing = inventoryItems.find(i => i.item === itemName);
    const previousQty = existing ? existing.qty : 0;

    if (existing) {
        existing.qty += qty;
    } else {
        inventoryItems.push({
            item: item.item,
            volume: item.volume,
            qty: qty
        });
    }

    inventoryHistory.push({
        type: "item",
        itemName: itemName,
        qtyAdded: qty,
        previousQty: previousQty
    });

    currentItemVolume = item.volume * qty;
    totalVolume = inventoryItems.reduce((sum, i) => sum + (i.volume * i.qty), 0);

    updateInventoryDisplay(`${qty} X ${item.item.toUpperCase()}`);
    triggerInventoryPulse("qty", "blue");
    triggerInventoryPulse("total", "blue");
    triggerHaptic("light");

    if (qtyInput) qtyInput.value = 1;
    updateUndoButtonState();
}
    
function updateLastItemQty(newQty) {
    if (!lastAddedItemName) return;

    let item = inventoryItems.find(i => i.item === lastAddedItemName);
    if (!item) return;

    let qty = parseInt(newQty, 10);
    if (isNaN(qty) || qty < 1) qty = 1;

    const previousQty = item.qty;
    if (previousQty === qty) return;

    item.qty = qty;

    inventoryHistory.push({
        type: "qty-edit",
        itemName: item.item,
        previousQty: previousQty,
        newQty: qty
    });

    currentItemVolume = item.volume * qty;
    totalVolume = inventoryItems.reduce((sum, i) => sum + (i.volume * i.qty), 0);

    updateInventoryDisplay(`${qty} X ${item.item.toUpperCase()}`);
    triggerInventoryPulse("qty", "blue");
    triggerInventoryPulse("total", "blue");
}
        function triggerInventoryPulse(target = "total", type = "blue") {
    let el = null;

    if (target === "qty") {
        el = document.getElementById("inv-qty");
    } else if (target === "total") {
        el = document.getElementById("inv-total-volume");
    } else if (target === "undo") {
        el = document.getElementById("undo-btn");
    }

    if (!el) return;

    el.classList.remove("pulse-blue", "pulse-red");
    void el.offsetWidth;
    el.classList.add(type === "red" ? "pulse-red" : "pulse-blue");
}

function triggerHaptic(type = "light") {
    if (!("vibrate" in navigator)) return;

    if (type === "light") {
        navigator.vibrate(20);
    } else if (type === "medium") {
        navigator.vibrate(35);
    } else if (type === "error") {
        navigator.vibrate([30, 20, 30]);
    }
}

function updateUndoButtonState() {
    const undoBtn = document.getElementById("undo-btn");
    if (!undoBtn) return;

    if (inventoryHistory.length > 0) {
        undoBtn.disabled = false;
        undoBtn.classList.remove("opacity-50", "pointer-events-none");
    } else {
        undoBtn.disabled = true;
        undoBtn.classList.add("opacity-50", "pointer-events-none");
    }
}

function undoLastInventoryAction() {
    if (inventoryHistory.length === 0) return;

    const action = inventoryHistory.pop();

    if (action.type === "item") {
        const item = inventoryItems.find(i => i.item === action.itemName);

        if (item) {
            item.qty = action.previousQty;

            if (item.qty <= 0) {
                inventoryItems = inventoryItems.filter(i => i.item !== action.itemName);
            }
        }

        totalVolume = inventoryItems.reduce((sum, i) => sum + (i.volume * i.qty), 0);
        currentItemVolume = 0;

        updateInventoryDisplay(`UNDO ${action.qtyAdded} X ${action.itemName.toUpperCase()}`);
    }

    else if (action.type === "volume") {
        totalVolume = Math.max(0, totalVolume - action.addedVolume);
        currentItemVolume = 0;

        updateInventoryDisplay(`UNDO ${action.qtyAdded} X ${action.unitVolume} CUFT`);
    }

    else if (action.type === "qty-edit") {
        const item = inventoryItems.find(i => i.item === action.itemName);

        if (item) {
            item.qty = action.previousQty;
            currentItemVolume = item.volume * item.qty;
        }

        totalVolume = inventoryItems.reduce((sum, i) => sum + (i.volume * i.qty), 0);

        updateInventoryDisplay(`UNDO QTY ${action.itemName.toUpperCase()}`);
    }

    triggerInventoryPulse("undo", "red");
    triggerInventoryPulse("total", "red");
    triggerHaptic("error");

    updateUndoButtonState();
}
function updateInventoryDisplay(logText = "No items added") {
    let log = document.querySelector(".log-bar");
    let volValue = document.querySelector(".vol-box span:last-child");
    let totalVolBox = document.getElementById("inv-total-volume");

    if (log) {
        log.innerText = logText;
    }

    if (volValue) {
        volValue.innerText = currentItemVolume;
    }

    if (totalVolBox) {
        totalVolBox.innerText = totalVolume;
    }
}
